    - data:
        code: "import json\n\ndef main(llm_data: dict):\n    \"\"\"\n    处理大模型返回的结构化审核数据，补充\
          \ moduleResult 和 summary 统计信息\n    :param llm_data: 大模型 SDK 直接返回的字典对象，格式如\
          \ {\"modules\": [...]}\n    :return: 包含 summary 和 modules 的完整 DTO 字典\n \
          \   \"\"\"\n    # 1. 安全获取 modules 列表\n    modules = llm_data.get(\"modules\"\
          , [])\n\n    # 2. 补充 moduleResult（任意 point.result == 1 则模块不通过）\n    for\
          \ module in modules:\n        points = module.get(\"points\", [])\n    \
          \    module[\"moduleResult\"] = 1 if any(p.get(\"result\") == 1 for p in\
          \ points) else 0\n\n    # 3. 精确统计\n    pass_count = sum(1 for m in modules\
          \ if m.get(\"moduleResult\") == 0)\n    reject_count = sum(1 for m in modules\
          \ if m.get(\"moduleResult\") == 1)\n\n    # 4. 判定整体结果（只要有 1 个模块不通过，整体即为不通过）\n\
          \    approval_result = 1 if reject_count > 0 else 0\n\n    # 5. 组装最终给前端/下游系统的完整结构\n\
          \    final_dto = {\n        \"summary\": {\n            \"approvalResult\"\
          : approval_result,\n            \"passCount\": pass_count,\n           \
          \ \"rejectCount\": reject_count\n        },\n        \"modules\": modules\n\
          \    }\n\n    return {\n        \"result\": final_dto,\n    }"
        code_language: python3
