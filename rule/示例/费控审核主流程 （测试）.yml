    value: "[\n  {\n    \"pointId\": 2,\n    \"module\": \"表单填写检查\",\n    \"pointName\"\
      : \"费用行说明\",\n    \"rule_content\": \"逐行比对费用明细信息，要求【费用明细项】与【费用说明】要有关联性。\\n1）费用明细项名称=电费时，费用说明不能包含“水”、“清洁”\\\
      n2）费用明细项名称=水费时，费用说明不能包含“电”、“清洁”\\n3）费用明细项名称=清洁支出时，费用说明不能包含“水”“电”\\\"\\n\",\n\
      \    \"expense_item_scope\": [\n      \"电费\",\n      \"水费\",\n      \"清洁支出\"\
      \n    ],\n    \"sources\": [\n      {\n        \"alias\": \"A\",\n        \"\
      from\": \"单据\",\n        \"path\": \"$.费用信息.费用明细[*]\",\n        \"iterate\"\
      : true,\n        \"description\": \"费用明细行对象\"\n      }\n    ],\n    \"join\"\
      : \"none\",\n    \"join_key\": null,\n    \"condition\": null,\n    \"assertion\"\
      : {\n      \"type\": \"semantic\",\n      \"description\": \"判断费用明细项与费用说明的语义关联性\"\
      ,\n      \"semantic_rules\": [\n        \"A.费用明细项名称=电费时，A.费用说明不能包含“水”、“清洁”\"\
      ,\n        \"A.费用明细项名称=水费时，A.费用说明不能包含“电”、“清洁”\",\n        \"A.费用明细项名称=清洁支出时，A.费用说明不能包含“水”“电”\"\
      \n      ],\n      \"judgment_basis\": \"根据费用明细项与费用说明的文字描述进行语义匹配\"\n    }\n \
      \ },\n  {\n    \"pointId\": 4,\n    \"module\": \"表单填写检查\",\n    \"pointName\"\
      : \"跨费用核销项\",\n    \"rule_content\": \"逐行检查费用明细信息，要求每行的【借款费用明细项】与【费用明细项】都要是一致的\\\
      n\",\n    \"expense_item_scope\": [],\n    \"sources\": [\n      {\n       \
      \ \"alias\": \"A\",\n        \"from\": \"单据\",\n        \"path\": \"$.费用信息.费用明细[*]\"\
      ,\n        \"iterate\": true,\n        \"description\": \"费用明细行对象\"\n      }\n\
      \    ],\n    \"join\": \"none\",\n    \"join_key\": null,\n    \"condition\"\
      : null,\n    \"assertion\": {\n      \"type\": \"semantic\",\n      \"description\"\
      : \"语义比对借款项与费用项，解决格式不一致（如一个带前缀一个不带）的问题\",\n      \"semantic_rules\": [\n   \
      \     \"A.借款费用明细项 与 A.费用明细项 指向的是同一种费用类型\"\n      ],\n      \"judgment_basis\"\
      : \"识别核心业务含义是否一致，忽略分隔符和前缀差异\"\n    }\n  },\n  {\n    \"pointId\": 5,\n    \"\
      module\": \"发票三流检查\",\n    \"pointName\": \"发票抬头\",\n    \"rule_content\": \"\
      逐条检查发票信息，要求每张发票的【购方名称】都要与【门店合同费用信息】的【付款公司】名称是一致的\\n\",\n    \"expense_item_scope\"\
      : [],\n    \"sources\": [\n      {\n        \"alias\": \"A\",\n        \"from\"\
      : \"单据\",\n        \"path\": \"$.发票信息[*].购方名称\",\n        \"iterate\": true,\n\
      \        \"description\": \"发票购方名称\"\n      },\n      {\n        \"alias\":\
      \ \"B\",\n        \"from\": \"单据\",\n        \"path\": \"$.门店合同费用信息.付款公司\",\n\
      \        \"iterate\": false,\n        \"description\": \"合同付款公司名称\"\n      }\n\
      \    ],\n    \"join\": \"broadcast\",\n    \"join_key\": null,\n    \"condition\"\
      : null,\n    \"assertion\": {\n      \"type\": \"exact\",\n      \"description\"\
      : \"对比发票抬头（购方）与合同付款公司\",\n      \"expression\": \"A == B\"\n    }\n  },\n  {\n\
      \    \"pointId\": 6,\n    \"module\": \"发票三流检查\",\n    \"pointName\": \"发票开具方\"\
      ,\n    \"rule_content\": \"1、逐张检查发票信息，要求本单所有发票的【销方名称】必须完全一致；若存在不同销方名称，则直接判定不通过，并在计算过程中明确列出是哪几张发票的【销方名称】与其他发票不一致\\\
      n2、以统一后的发票【销方名称】作为比对基准，逐行检查费用明细的【原费用供应商名称】；若有不一致的费用行，需在计算过程中逐行列明\\n3、逐行对费用明细的【费用明细项】做语义归一，例如将“租赁支出-门店房租”归一为“门店房租”，并且只能通过【标准发票项目映射表】映射对应的【门店合同费用项目类型】来定位【门店合同费用信息】\\\
      n4、若映射表未命中，或映射结果对应的【门店合同费用项目类型】为“不参考门店信息表”，则该费用行直接判定不通过，并提示【信息不足需人工审核】，且不再继续匹配门店合同费用信息；若映射结果不是“不参考门店信息表”，但对应门店合同费用项目类型在【门店合同费用信息】中的费用信息为空、费用列表为空、配置为“无需支付”，或缺少供应商名称和收款户名，则该费用行需提醒，输出【费用项不满足报账条件】，并判定不通过；若映射结果对应多个门店合同费用项目类型（如“电费、水费”），则需将多个类型逐个拆开后分别匹配对应的门店合同费用信息，不能直接按无法唯一定位处理\\\
      n5、公司名称比对必须采用规范化后的完全相等；不得因包含关系、少字、多字、简称、品牌相近或语义相近判定一致\\n6、在定位到对应的门店合同费用信息后，按优先级判断：\\\
      n  （1）若发票【销方名称】=费用明细【原费用供应商名称】=合同【供应商名称】=合同【收款户名】，则输出【发票符合三流一致标准】\\n  （2）否则，若发票【销方名称】=合同【收款户名】，则输出【发票销方与收款户名一致】\\\
      n  （3）否则，若发票【销方名称】=合同【供应商名称】，则输出【发票销方与供应商一致】\\n7、若费用明细归一后的标准项属于【门店房租、提成房租、仓库房租、门店物业费、物业费】，且前述条件均不满足，则继续比对发票【销方名称】与合同【合同甲方】；若一致，则输出【发票销方与签约方一致】；若仍不一致，则输出【发票销方与供应商、收款方、签约方均不一致，请检查】\\\
      n8、若费用明细归一后的标准项不属于上述五类，且前述条件均不满足，则输出【不符合审核要求，请检查】\\n9、当某一费用行映射到多个门店合同费用项目类型时，需要对每一个对应合同类型都完成上述校验；仅当全部对应合同类型都满足要求时，该费用行才算通过；只要其中任意一个对应合同类型不满足要求，该费用行即判定为不通过\\\
      n10、只要存在任意一张发票销方不一致，或任意一行费用明细最终不满足上述要求，则本审核点整体不通过；仅当全部适用费用行均满足要求时，本审核点整体通过\"\
      ,\n    \"expense_item_scope\": [],\n    \"sources\": [\n      {\n        \"\
      alias\": \"A_List\",\n        \"from\": \"单据\",\n        \"path\": \"$.费用信息.费用明细[*]\"\
      ,\n        \"iterate\": false,\n        \"description\": \"报账单全量费用明细行列表\"\n\
      \      },\n      {\n        \"alias\": \"B_List\",\n        \"from\": \"单据\"\
      ,\n        \"path\": \"$.发票信息[*]\",\n        \"iterate\": false,\n        \"\
      description\": \"报账单全量发票列表（含销方名称）\"\n      },\n      {\n        \"alias\": \"\
      C_Map\",\n        \"from\": \"外部数据:标准发票项目映射表\",\n        \"path\": \"$\",\n\
      \        \"iterate\": false,\n        \"description\": \"费用项到合同费用类型的标准映射关系\"\
      \n      },\n      {\n        \"alias\": \"D_Contract\",\n        \"from\": \"\
      单据\",\n        \"path\": \"$.门店合同费用信息.门店条款信息\",\n        \"iterate\": false,\n\
      \        \"description\": \"门店合同各费用类型的详细条款对象\"\n      }\n    ],\n    \"join\"\
      : \"none\",\n    \"assertion\": {\n      \"type\": \"pipeline\",\n      \"steps\"\
      : [\n        {\n          \"stepId\": 1,\n          \"type\": \"semantic_check\"\
      ,\n          \"description\": \"检查发票销方唯一性并记录费用供应商与销方的不一致行\",\n          \"semantic_rules\"\
      : [\n            \"1.【统一销方检查】：遍历 B_List 读取每张发票的“销方名称”并去重。本单所有发票的销方名称必须完全一致；若存在两个及以上不同的销方名称，立即判定本点不通过，并在计算过程中逐张列出是哪几张发票的销方名称与其他发票不一致，不得将该情形表述为【信息不足需人工审核】。\"\
      ,\n            \"2.【缺失处理】：若发票列表为空，或任一发票缺少“销方名称”，视为信息不足，直接判定本点不通过，并在计算过程中明确输出【信息不足需人工审核】。\"\
      ,\n            \"3.【基准销方】：若步骤1通过，则将唯一的销方名称作为本单统一销方，用于后续全部费用行与合同信息的比对。\",\n \
      \           \"4.【费用供应商逐行检查】：遍历 A_List，逐行读取“原费用供应商名称”，判断其是否与统一销方一致；若某行不一致，必须在\
      \ calculationProcess 中逐行写明“第X行费用明细供应商为XXX，发票销方为YYY，不一致”。\",\n            \"\
      5.【三流一致前提】：仅当某一费用行的“原费用供应商名称”与统一销方一致时，该行才可能被判定为【发票符合三流一致标准】；若该行费用供应商与统一销方不一致，则该行不得输出【发票符合三流一致标准】，但仍需继续进入下一步，判断是否命中更低优先级的通过文案。\"\
      \n          ],\n          \"on_failure\": 1\n        },\n        {\n       \
      \   \"stepId\": 2,\n          \"type\": \"semantic_check\",\n          \"description\"\
      : \"按标准映射定位合同信息并逐行执行销方一致性判断\",\n          \"semantic_rules\": [\n          \
      \  \"1.【费用项归一】：遍历 A_List，对每一行“费用明细项”先做语义归一，将其归一到 C_Map 的标准费用项 key，例如“租赁支出-门店房租”归一为“门店房租”，“经营支出-电费”归一为“电费”。归一时只能在\
      \ C_Map 已有 key 范围内判断，不得自造新类别。\",\n            \"2.【映射未命中处理】：若某一费用行无法明确归一到 C_Map\
      \ 中的任一标准费用项 key，则该行直接判定为不通过，并在计算过程中写明该行【信息不足需人工审核】。\",\n            \"3.【合同类型定位】：对归一成功的费用行，读取\
      \ C_Map[标准费用项].门店合同费用项目类型，作为定位 D_Contract 的依据。若该值为空、缺失，或等于“不参考门店信息表”，则该行直接判定为不通过，并在计算过程中写明【信息不足需人工审核】；不得继续去门店条款信息中查找字段。\"\
      ,\n            \"4.【多合同类型展开】：若上一步得到的是单个合同费用项目类型，则按单个类型处理；若得到的是以顿号、逗号或中文逗号分隔的多个合同费用项目类型（如“电费、水费”），必须先拆分为多个独立类型，再逐个到\
      \ D_Contract 中查找对应条款，不得将该情形直接认定为无法唯一定位或信息不足。\",\n            \"5.【合同记录读取】：对拆分后的每一个合同费用项目类型分别去\
      \ D_Contract 查找对应条款。仅当门店合同费用项目类型不是“不参考门店信息表”时，才继续读取 D_Contract；若已是“不参考门店信息表”，不得继续读取合同条款。若对应合同类型下的“费用”为空对象、空值，或“费用列表”为空数组、空值，或费用记录的“付款方式/支付方式”显示为“无需支付”（如\
      \ paymentWay=2、paymentWayDesc=无需支付、付款方式=无需支付），或费用记录只包含 feeType、paymentWay、paymentWayDesc\
      \ 等支付方式字段但没有供应商名称、收款户名等可用于三流比对的信息，则不能视为有效费用记录，该费用行直接判定为不通过，并在计算过程中输出该费用项【费用项不满足报账条件】。若对应结构为“费用”且不为空，则直接读取其中的“供应商名称”“收款户名”等字段；若对应结构为“费用列表”且不为空，则需遍历列表中全部记录；若存在“合同甲乙方”列表，则在需要时遍历其中全部“合同甲方”。\"\
      ,\n            \"6.【公司名称强一致口径】：统一销方、该行原费用供应商名称、合同供应商名称、合同收款户名、合同甲方之间的公司名称比对，只能在规范化后完全相等时判定一致。规范化仅允许处理空格、全半角、括号等格式差异；不得因包含关系、少字、多字、简称、品牌相近、主体字号相近或语义相近判定一致。若两个名称不同，必须在计算过程中写明“XXX\
      \ 与 YYY 不一致”，不得输出对应的一致文案。\",\n            \"7.【逐行优先级判断】：对每一行费用明细，使用统一销方作为发票侧唯一比较值，并按以下优先级判断，且只能输出命中的最高优先级文案一条：若统一销方、该行原费用供应商名称、合同供应商名称、合同收款户名四者规范化后完全相等，则输出【发票符合三流一致标准】；否则，若统一销方与合同收款户名规范化后完全相等，则输出【发票销方与收款户名一致】；否则，若统一销方与合同供应商名称规范化后完全相等，则输出【发票销方与供应商一致】。输出【发票销方与供应商一致】前，必须在计算过程中列明统一销方和合同供应商名称，并说明二者完全相等；若二者不完全相等，不得输出该文案。\"\
      ,\n            \"8.【五类费用补充判断】：若某行归一后的标准费用项属于“门店房租、提成房租、仓库房租、门店物业费、物业费”，且该行前述三种结果均未命中，则继续比对统一销方与合同甲方。只有合同甲方与统一销方规范化后完全相等时，才可输出【发票销方与签约方一致】；若全部都不一致，则输出【发票销方与供应商、收款方、签约方均不一致，请检查】并判定该行不通过。\"\
      ,\n            \"9.【非五类费用失败输出】：若某行归一后的标准费用项不属于“门店房租、提成房租、仓库房租、门店物业费、物业费”，且该行前述三种结果均未命中，则输出【不符合审核要求，请检查】并判定该行不通过。\"\
      ,\n            \"10.【多合同记录处理】：当某一合同费用类型下存在多条合同记录时，只要其中任意一条合同记录满足当前费用行对应优先级判断条件，即可视为该费用行在该合同类型下命中该层级；只有该合同类型下全部合同记录都不满足时，才能判定该费用行在该合同类型下未命中。\"\
      ,\n            \"11.【多合同类型整体判定】：当某一费用行映射到多个合同费用项目类型时，必须对每一个合同类型分别完成判断；只有全部对应合同类型都命中通过条件时，该费用行才算通过。只要其中任意一个合同类型未命中通过条件、条款缺失或字段不足，该费用行即判定为不通过。\"\
      ,\n            \"12.【整体结论】：仅当全部费用行都完成归一映射，并且每一行最终都命中上述通过文案之一时，本步骤判定通过并整体通过；只要存在任意费用行映射失败、信息不足或最终未命中通过条件，则本步骤判定失败，整条规则判定为不通过。\"\
      \n          ],\n          \"on_success\": 1,\n          \"on_failure\": 1\n\
      \        }\n      ]\n    }\n  },\n  {\n    \"pointId\": 7,\n    \"module\":\
      \ \"发票项目检查\",\n    \"pointName\": \"开票项目\",\n    \"rule_content\": \"1、检查发票项目禁止项：所有实际存在的发票行【货物或应税劳务名称】均不得命中【*餐饮服务*xxx】；若整单费用明细项归一后不包含【清洁支出】或【污水处理费】，则所有实际存在的发票行【货物或应税劳务名称】均不得命中【*生活服务*xxx】\\\
      n2、费用侧汇总：逐行读取费用明细，将【费用明细项】归一到【标准发票项目映射表】中的标准费用项 key，再按标准费用项合计【核销金额】\\n3、发票侧汇总：只能逐行读取实际存在的发票行【货物或应税劳务名称】作为发票项目，并按其原文合计发票行金额；若不存在发票行，或发票行缺少【货物或应税劳务名称】，则发票项目组合为空，不得从发票头、合同信息、标准映射表、附件名称或费用说明中生成发票项目；发票行金额取该行【金额(含税)】，若缺失才用同一行【金额(不含税)】+【税额】\\\
      n4、映射比较：对每个标准费用项，必须先使用【标准发票项目映射表】中该费用项对应的【发票项目名称】筛选实际存在的发票项目，形成该费用项独立的发票金额池；实际发票项目与标准模式都按【*税收分类简称*品名】解析，两个星号中间的税收分类简称必须完全一致，后面的品名/xxx不得用于语义替代税收分类简称\\\
      n5、金额比较：只能用该标准费用项自己的发票金额池合计金额与该费用项核销金额比较；未命中该费用项映射模式的发票项目不得计入该费用项，同一发票项目金额不得重复计入多个标准费用项，不得为了满足金额覆盖拼接、挪用或交叉计入其他费用项的发票金额\\\
      n6、若全部费用项均匹配成功且各自金额池覆盖核销金额，输出【发票项目符合标准】并通过；否则将未通过项转入非标管理标签容错检查\\n7、非标容错：未通过项对应的门店合同费用项目类型若为“不参考门店信息表”，直接不通过并提示人工审核；否则检查对应门店合同费用信息中的发票项目；若对应费用信息为多笔列表，只取第一笔记录比较，后续记录不参与判断；第一笔记录的发票项目为“其他”或“除以上选项”时，输出【非标发票项目有管理标签】并通过，否则不通过。\"\
      ,\n    \"expense_item_scope\": [],\n    \"sources\": [\n      {\n        \"\
      alias\": \"A_List\",\n        \"from\": \"单据\",\n        \"path\": \"$.费用信息.费用明细[*]\"\
      ,\n        \"iterate\": false,\n        \"description\": \"报账单全量费用明细行列表\"\n\
      \      },\n      {\n        \"alias\": \"B_List\",\n        \"from\": \"单据\"\
      ,\n        \"path\": \"$.发票信息[*].发票行[*]\",\n        \"iterate\": false,\n  \
      \      \"description\": \"报账单全量发票明细行列表\"\n      },\n      {\n        \"alias\"\
      : \"C_Map\",\n        \"from\": \"外部数据:标准发票项目映射表\",\n        \"path\": \"$\"\
      ,\n        \"iterate\": false,\n        \"description\": \"费用项与发票品名、合同类型的标准映射关系字典\"\
      \n      },\n      {\n        \"alias\": \"D_Contract\",\n        \"from\": \"\
      单据\",\n        \"path\": \"$.门店合同费用信息.门店条款信息\",\n        \"iterate\": false,\n\
      \        \"description\": \"门店合同各费用类型的详细条款对象\"\n      }\n    ],\n    \"join\"\
      : \"none\",\n    \"assertion\": {\n      \"type\": \"pipeline\",\n      \"steps\"\
      : [\n        {\n          \"stepId\": 1,\n          \"type\": \"semantic_check\"\
      ,\n          \"description\": \"执行发票项目禁止项、费用归类、发票汇总与标准金额校验\",\n          \"\
      semantic_rules\": [\n            \"1.【餐饮服务禁止项】：遍历 B_List 读取每一行“货物或应税劳务名称”，若任意发票行命中【*餐饮服务*xxx】，本审核点直接判定不通过，并在计算过程中列明命中的发票行名称；不得继续用标准映射或非标管理标签容错改判通过。\"\
      ,\n            \"2.【生活服务条件禁止项】：先遍历 A_List，将“费用明细项”语义归一后判断整单是否包含【清洁支出】或【污水处理费】。若整单不包含上述任一费用项，则遍历\
      \ B_List 读取每一行“货物或应税劳务名称”，任意发票行命中【*生活服务*xxx】时，本审核点直接判定不通过，并在计算过程中列明命中的发票行名称；不得继续用标准映射或非标管理标签容错改判通过。\"\
      ,\n            \"3.【费用侧归类汇总】：遍历 A_List，每一行先将“费用明细项”归一到 C_Map 的标准费用项 key，例如“经营支出-电费”归一为“电费”，“经营支出-水费”归一为“水费”；再按归一后的标准费用项合计“核销金额”。计算过程中必须列明每个标准费用项的原始费用明细项和核销金额汇总，例如“电费：经营支出-电费，核销金额XXX；水费：经营支出-水费，核销金额XXX”。\"\
      ,\n            \"4.【发票侧项目汇总】：遍历 B_List，每一行只能读取该发票行实际存在的“货物或应税劳务名称”作为发票项目，并按原文分组汇总发票金额。若\
      \ B_List 为空，或发票行缺少“货物或应税劳务名称”，则发票项目组合为空，并在计算过程中写明“未取得实际发票行货物或应税劳务名称”；不得从发票头“含税金额/不含税金额/合计税额”、合同信息、C_Map\
      \ 标准映射表、附件名称、费用说明或费用明细项中生成、补全、猜测发票项目。发票金额只能在存在实际发票项目时取同一发票行的“金额(含税)”；若该字段缺失，才用同一发票行的“金额(不含税)”+“税额”。不得使用费用明细中的“核销金额”“回票金额”“欠票金额”，不得根据费用明细项、附件名称或匹配关系调整发票金额。计算过程中必须列明每个实际发票项目的原始发票行金额，例如“*供电*电费：发票金额XXX；*水冰雪*水费：发票金额XXX”。\"\
      ,\n            \"5.【逐费用项映射比较】：对每个标准费用项，读取 C_Map[标准费用项].发票项目名称，必须先用该费用项允许的发票项目模式筛选实际存在于发票行“货物或应税劳务名称”的发票项目，形成该标准费用项独立的发票金额池；若发票项目组合为空，则所有标准费用项均视为名称不匹配，不得输出【发票项目符合标准】。实际发票项目和标准映射模式都按【*税收分类简称*品名】解析，匹配时必须强校验两个星号中间的税收分类简称完全一致；标准模式中的“xxx”仅表示后缀品名占位，不参与税收分类简称匹配，不得用后缀品名语义相近替代税收分类简称。例如实际发票项目【*经营租赁*房屋租赁费】可匹配标准模式【*经营租赁*xxx】；实际发票项目【*现代服务*房屋租赁】不得匹配标准模式【*经营租赁*xxx】。电费只能匹配\
      \ C_Map[电费].发票项目名称，水费只能匹配 C_Map[水费].发票项目名称；不得因为金额相等、顺序相近、附件名称或费用说明而交叉匹配。\",\n\
      \            \"6.【金额池隔离】：每个标准费用项只能使用自己的发票金额池合计金额与该费用项核销金额比较。未命中该标准费用项映射模式的发票项目，金额一分钱都不得计入该费用项；同一发票项目金额不得重复计入多个标准费用项；不得为了满足金额覆盖，将其他费用项已匹配或未匹配的发票项目金额拼接、挪用或交叉计入。判断顺序必须是：映射名称筛选\
      \ -> 金额池合计 -> 金额比较，不得先按金额相等反推匹配关系。\",\n            \"7.【逐项输出要求】：计算过程中必须逐项输出“标准费用项、核销金额、该费用项允许的发票项目模式、命中的实际发票项目、未计入该费用项金额池的发票项目、该费用项发票金额池合计、金额比较结果”。对于任一标准费用项，只能输出命中该费用项允许模式的发票项目金额池；任一实际发票项目若未命中当前费用项允许模式，必须写明“未计入该费用项金额池”，不得出现定制化挪用或拼接。\"\
      ,\n            \"8.【标准通过判定】：只有全部标准费用项均找到映射允许的发票项目，且每个标准费用项自己的发票金额池合计金额 >= 该标准费用项核销金额时，才可判定本步骤通过，并在计算过程中明确输出【发票项目符合标准】。\"\
      ,\n            \"9.【流转范围】：凡存在映射未命中、名称不匹配或金额池合计金额不足的标准费用项，均记录为【未直接通过项】或【待补充校验项】，并流转至步骤2继续检查；不得在本步骤直接省略这些未通过项。\"\
      ,\n            \"10.【整体结论】：仅当不存在上述禁止项，且全部标准费用项均在本步骤满足标准匹配和各自金额池覆盖要求时，整条规则直接通过；否则将未直接通过项流转至步骤2执行非标容错校验。\"\
      \n          ],\n          \"on_success\": 1,\n          \"on_failure\": 0\n\
      \        },\n        {\n          \"stepId\": 2,\n          \"type\": \"semantic_check\"\
      ,\n          \"description\": \"执行非标发票项目管理标签容错检查\",\n          \"semantic_rules\"\
      : [\n            \"1.【锁定对象】：本步骤仅处理步骤1中未能按标准项目直接通过的【未直接通过项】或【待补充校验项】，包括映射未命中、名称不匹配或金额不足的费用类别。\"\
      ,\n            \"2.【前置拦截】：先查看待核验项对应的 C_Map[标准分类].门店合同费用项目类型。若结果为“不参考门店信息表”，则该项不得继续匹配门店合同费用信息，应直接判定为不通过，并在计算过程中明确写明“该费用类型不参考门店信息表，需人工审核”。\"\
      ,\n            \"3.【合同比对】：仅对门店合同费用项目类型不等于“不参考门店信息表”的待核验项，去 D_Contract 查找对应条款中的“发票项目”字段；若该费用类型下为列表结构，只读取列表第一笔配置，后续配置不参与本步骤判断，并在计算过程中写明只取第一笔。\"\
      ,\n            \"4.【容错判定】：若对应合同配置为单条对象，则以该对象的“发票项目”为准；若对应合同配置为列表，则仅以第一笔配置的“发票项目”为准。只有该发票项目等于“其他”或“除以上选项”时，才可将该待核验项判定为容错通过，并在计算过程中输出【非标发票项目有管理标签】。\"\
      ,\n            \"5.【失败输出】：若按上述口径选定的合同配置未命中“其他”或“除以上选项”，则该项判定为不通过，并在计算过程中输出【不复核审核要求，请检查】。\"\
      ,\n            \"6.【整体结论】：只有当全部待核验项均满足上述非标管理标签条件时，本步骤判定通过并整体通过；否则本步骤判定失败，整条规则判定为不通过。\"\
      ,\n            \"7.【禁止回退改判】：若本步骤已经判定通过并整体通过，不得再因步骤1存在未命中、名称不匹配或金额不足等【未直接通过记录】而将结论改判为不通过，也不得输出“因步骤1未通过所以整体不通过”或同义表述。\"\
      \n          ],\n          \"on_success\": 1,\n          \"on_failure\": 1\n\
      \        }\n      ]\n    }\n  },\n  {\n    \"pointId\": 8,\n    \"module\":\
      \ \"无票核销核查\",\n    \"pointName\": \"管理标签\",\n    \"rule_content\": \"逐行检查费用明细信息，\\\
      n变量：【核销-费用类型与门店合同费用项目类型映射】\\n如果费用明细信息的【发票类型】为“无票核销”，根据【标准发票项目映射表】通过【费用明细项】匹配对应的【门店合同费用项目类型】。若匹配结果为“不参考门店信息表”，则不再继续匹配门店合同费用信息，直接判定为不通过并提示人工审核；否则继续检查【门店合同费用信息】中对应项目的发票信息/发票类型是否为无发票，是则审核通过，反之不通过。\"\
      ,\n    \"expense_item_scope\": [],\n    \"sources\": [\n      {\n        \"\
      alias\": \"A\",\n        \"from\": \"单据\",\n        \"path\": \"$.费用信息.费用明细[*]\"\
      ,\n        \"iterate\": true,\n        \"description\": \"费用明细行\"\n      },\n\
      \      {\n        \"alias\": \"B\",\n        \"from\": \"外部数据:标准发票项目映射表\",\n\
      \        \"path\": \"$\",\n        \"iterate\": false,\n        \"description\"\
      : \"映射表查询（带语义映射）\",\n        \"key_map\": {\n          \"type\": \"semantic\"\
      ,\n          \"description\": \"费用明细项语义纠错转换\",\n          \"source_field\":\
      \ \"A.费用明细项\",\n          \"candidates\": [\n            \"电费\",\n         \
      \   \"清洁支出\",\n            \"水费\",\n            \"杂项物业费\",\n            \"污水处理费\"\
      ,\n            \"水电公摊费\",\n            \"物业费\",\n            \"门店物业费\",\n  \
      \          \"门店房租\",\n            \"提成房租\",\n            \"仓库房租\",\n       \
      \     \"招牌相关费用\",\n            \"进场费\"\n          ],\n          \"on_failure\"\
      : 1\n        }\n      },\n      {\n        \"alias\": \"C\",\n        \"from\"\
      : \"单据\",\n        \"path\": \"$.门店合同费用信息.门店条款信息\",\n        \"iterate\": false,\n\
      \        \"description\": \"合同条款详情\"\n      }\n    ],\n    \"join\": \"none\"\
      ,\n    \"condition\": {\n      \"description\": \"仅针对无票核销行生效\",\n      \"path\"\
      : \"A.发票类型\",\n      \"operator\": \"==\",\n      \"value\": \"无票核销\"\n    },\n\
      \    \"assertion\": {\n      \"type\": \"semantic\",\n      \"description\"\
      : \"检查合同中对应的项目是否允许无发票\",\n      \"semantic_rules\": [\n        \"先查看 B[A.费用明细项].门店合同费用项目类型。若结果为“不参考门店信息表”，则该行不得继续匹配门店合同费用信息，应直接判定为不通过，并在计算过程中明确写明“该费用类型不参考门店信息表，需人工审核”。若结果不是“不参考门店信息表”，再根据该类型在合同条款\
      \ C 中查找对应的发票类型。注意：合同中该费用类型下的配置可能为单条对象或对象列表，需遍历检查其中是否存在任意一条发票类型配置为 '无发票'。\"\n\
      \      ],\n      \"judgment_basis\": \"根据费用项关联的合同条款配置判断其是否允许无票核销\"\n    }\n\
      \  }\n]"
